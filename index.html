<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Roll Verifier</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    <style>
        body {
            padding: 1rem;
            background-color: #f3f4f6;
            font-family: Arial, sans-serif;
        }
        .container {
            max-width: 60rem;
            margin: 0 auto;
        }
        h1 {
            font-size: 1.5rem;
            font-weight: bold;
            margin-bottom: 1rem;
        }
        #input {
            width: 100%;
            height: 8rem;
            padding: 0.5rem;
            border: 1px solid #d1d5db;
            border-radius: 0.25rem;
            margin-bottom: 1rem;
            box-sizing: border-box;
        }
        button {
            background-color: #3b82f6;
            color: white;
            padding: 0.5rem 1rem;
            border: none;
            border-radius: 0.25rem;
            cursor: pointer;
        }
        button:hover {
            background-color: #2563eb;
        }
        #output {
            margin-top: 1rem;
        }
        .error {
            color: #721c24;
            background-color: #f8d7da;
            padding: 0.5rem;
            border-radius: 0.25rem;
        }
        .warning {
            color: #856404;
            background-color: #fff3cd;
            padding: 0.5rem;
            border-radius: 0.25rem;
        }
        .check { color: #0ce83f; font-weight: bold; }
        .cross { color: #721c24; font-weight: bold; }
        .warn { color: #856404; font-weight: bold; }
        .dim { color: #6b7280; font-style: italic; }
        .result-box {
            background-color: #fff;
            padding: 1.5rem;
            border: 1px solid #d1d5db;
            border-radius: 0.5rem;
            margin-top: 1rem;
            line-height: 1.6;
        }
        .result-success { border-left: 4px solid #155724; }
        .result-error { border-left: 4px solid #721c24; }
        .result-partial { border-left: 4px solid #856404; }
        hr { border: 0; border-top: 1px solid #e5e7eb; margin: 1rem 0; }
        pre {
            background-color: #f9fafb;
            padding: 0.5rem;
            border: 1px solid #d1d5db;
            border-radius: 0.25rem;
            overflow-x: auto;
            margin-bottom: 1rem;
        }
        p {
          margin-block-end: 0px;
        }
    </style>
    <script>
        const ROLL_CHARS = 15;

        const generateRoll = (
          serverSeed,
          clientSeed,
          nonce,
          roll_max,
        ) => {
          const hash = CryptoJS.HmacSHA512(
            serverSeed,
            `${clientSeed}-${nonce}`
          ).toString(CryptoJS.enc.Hex);

          const subHash = hash.substring(0, ROLL_CHARS);
          const decimal = BigInt(`0x${subHash}`);
          const roll = decimal % BigInt(roll_max);

          return Number(roll);
        };

        const calculatePublicHash = (secret, salt) => {
          const hash = CryptoJS.HmacSHA256(secret, salt).toString(CryptoJS.enc.Hex);
          return hash;
        };

        const checkRequiredProps = (obj, props) => {
          for (const prop of props) {
            if (!obj.hasOwnProperty(prop) || obj[prop] === "") {
              return false;
            }
          }
          return true;
        };

        const checkRegularRoll = (data) => {
          let html = "";

          const req = [
            "server_seed",
            "secret_salt",
            "public_hash",
            "client_seed",
            "nonce",
            "roll",
          ];
          if (typeof data !== "object" || !checkRequiredProps(data, req)) {
            return '<p class="error">Your input is invalid.<br> Try copy JSON string from the site and paste here.</p>';
          }
          if (data.server_seed[0] === "*" || data.secret_salt[0] === "*") {
            return '<p class="warning">Server Seed seems to be not yet revealed.<br> It is impossible to verify roll right now.</p>';
          }

          const calculated = generateRoll(
            data.server_seed,
            data.client_seed,
            parseInt(data.nonce),
            parseInt(data.drawable_total)
          );

          const expected = parseInt(data.roll);
          const merkleIndex = parseInt(data.merkle_index); // if provided

          const hasExpected = !isNaN(expected);
          const hasMerkleIndex = !isNaN(merkleIndex);
          const isRollMatch = hasExpected && calculated === expected;

          let overallSuccess = true;

          // Step 1: Verify HMAC roll matches original_roll
          html += `<p><b>Step 1: HMAC Roll Verification</b><br>`;
          html += `&nbsp;&nbsp;Calculated Roll: <b>${calculated}</b><br>`;
          if (hasExpected) {
            html += `&nbsp;&nbsp;Original Roll: <b>${expected}</b><br>`;
            html += isRollMatch
              ? `&nbsp;&nbsp;<span class="check">&#10003;</span> HMAC roll matches original_roll<br>`
              : `&nbsp;&nbsp;<span class="cross">&#10007;</span> HMAC roll does NOT match original_roll<br>`;
            if (!isRollMatch) overallSuccess = false;
          }
          html += `</p>`;

          // Step 2: Explain linear probing (if merkle_index differs from roll)
          if (hasExpected && hasMerkleIndex) {
            html += `<p><b>Step 2: Linear Probing</b><br>`;
            html += `&nbsp;&nbsp;Original Roll: <b>${expected}</b><br>`;
            html += `&nbsp;&nbsp;Merkle Index: <b>${merkleIndex}</b><br>`;
            if (expected === merkleIndex) {
              html += `&nbsp;&nbsp;<span class="check">&#10003;</span> No linear probing needed — position was available<br>`;
            } else {
              html += `&nbsp;&nbsp;<span class="warn">&#9888;</span> Linear probing applied: position ${expected} was already drawn, `;
              html += `probed forward to ${merkleIndex}<br>`;
              html += `&nbsp;&nbsp;<span class="dim">This is normal — the server cannot control which positions are occupied.</span><br>`;
            }
            html += `</p>`;
          }

          // Step 3: Public Hash Verification
          const calculatedPublicHash = calculatePublicHash(
            data.server_seed,
            data.secret_salt
          );
          
          let stepNumber = (hasExpected && hasMerkleIndex) ? 3 : 2;
          
          html += `<p><b>Step ${stepNumber}: Public Hash Verification</b><br>`;
          html += `&nbsp;&nbsp;Original Public Hash:<br>&nbsp;&nbsp;<b>${data.public_hash}</b><br>`;
          html += `&nbsp;&nbsp;Calculated Public Hash:<br>&nbsp;&nbsp;<b>${calculatedPublicHash}</b><br>`;
          
          if (data.public_hash === calculatedPublicHash) {
            html += `&nbsp;&nbsp;<span class="check">&#10003;</span> Public Hash matches!<br>`;
          } else {
            html += `&nbsp;&nbsp;<span class="cross">&#10007;</span> Public Hash mismatch.<br>`;
            overallSuccess = false;
          }
          html += `</p>`;

          html += `<hr>`;

          // Summary
          html += `<p>`;
          if (!hasExpected) {
            html += `<span class="dim">No original_roll provided — showing calculated result only.</span>`;
            overallSuccess = false;
          } else if (isRollMatch) {
            html += `<span class="check">&#10003;</span> <b>Roll is valid!</b> The draw was deterministic.`;
            if (hasMerkleIndex && expected !== merkleIndex) {
              html += `<br><span class="dim">The merkle_index (${merkleIndex}) differs from the roll (${expected}) due to linear probing — this is expected behavior.</span>`;
            }
          } else {
            html += `<span class="cross">&#10007;</span> <b>Roll mismatch.</b> Expected ${expected}, got ${calculated}.`;
          }
          html += `</p>`;

          // Full hash for transparency
          const fullHash = CryptoJS.HmacSHA512(data.server_seed, `${data.client_seed}-${data.nonce}`).toString(CryptoJS.enc.Hex);
          html += `<p><span class="dim">Full HMAC-SHA512: ${fullHash.substring(0, 30)}...</span></p>`;

          const boxClass = overallSuccess && hasExpected ? 'result-success' : (!hasExpected ? 'result-partial' : 'result-error');

          return `<div class="result-box ${boxClass}">${html}</div>`;
        };

        const verifyRoll = (rollData) => {
          try {
            const data = JSON.parse(rollData);
            const message = checkRegularRoll(data);
            return message;
          } catch (_error) {
            return "<p class='error'>Invalid JSON format. Please check your input.</p>";
          }
        };
    </script>
</head>
<body>
    <div class="container">
      <div id="output"></div>
        <h1>Enter Your Roll Data:</h1>
        <textarea id="input" placeholder="Paste JSON here..."></textarea>
        <button onclick="verifyInput()">Check!</button>
    </div>
    <script>
        function verifyInput() {
            const input = document.getElementById('input').value;
            const result = verifyRoll(input);
            document.getElementById('output').innerHTML = result;
        }
    </script>
</body>
</html>
