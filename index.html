<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Roll Verifier</title>
    <style>
      body {
        padding: 1rem;
        background-color: #f3f4f6;
        font-family: Arial, sans-serif;
      }
      .container {
        max-width: 60rem;
        margin: 0 auto;
      }
      h1 {
        font-size: 1.5rem;
        font-weight: bold;
        margin-bottom: 1rem;
      }
      #input {
        width: 100%;
        height: 8rem;
        padding: 0.5rem;
        border: 1px solid #d1d5db;
        border-radius: 0.25rem;
        margin-bottom: 1rem;
        box-sizing: border-box;
      }
      button {
        background-color: #3b82f6;
        color: white;
        padding: 0.5rem 1rem;
        border: none;
        border-radius: 0.25rem;
        cursor: pointer;
      }
      button:hover {
        background-color: #2563eb;
      }
      #output {
        margin-top: 1rem;
      }
      .info-top {
        background-color: #e2e3e5;
        color: black;
        padding: 0.5rem;
        border-radius: 0.25rem 0.25rem 0 0;
        margin-top: 2rem;
      }
      .success-bottom {
        color: #155724;
        background-color: #d4edda;
        padding: 0.5rem;
        border-radius: 0 0 0.25rem 0.25rem;
        margin-top: 0;
      }
      .error-bottom {
        color: #721c24;
        background-color: #f8d7da;
        padding: 0.5rem;
        border-radius: 0 0 0.25rem 0.25rem;
        margin-top: 0;
      }
      .warning-bottom {
        color: #856404;
        background-color: #fff3cd;
        padding: 0.5rem;
        border-radius: 0 0 0.25rem 0.25rem;
        margin-top: 0;
      }
      .error {
        color: #721c24;
        background-color: #f8d7da;
        padding: 0.5rem;
        border-radius: 0.25rem;
      }
      .warning {
        color: #856404;
        background-color: #fff3cd;
        padding: 0.5rem;
        border-radius: 0.25rem;
      }
      .check {
        color: #155724;
        font-weight: bold;
      }
      .cross {
        color: #721c24;
        font-weight: bold;
      }
      .warn {
        color: #856404;
        font-weight: bold;
      }
      .dim {
        color: #6b7280;
        font-style: italic;
      }
      hr {
        border: 0;
        border-top: 1px solid #e5e7eb;
        margin: 1rem 0;
      }
      pre {
        background-color: #f9fafb;
        padding: 0.5rem;
        border: 1px solid #d1d5db;
        border-radius: 0.25rem;
        overflow-x: auto;
        word-break: break-all;
        white-space: pre-wrap;
      }
      p {
        margin-block-end: 0px;
      }
      .wrap-text {
        word-wrap: break-word;
        word-break: break-all;
        overflow-wrap: break-word;
        white-space: normal;
      }
      .final-result {
        margin-top: 2rem;
        padding: 1rem;
        border-radius: 0.5rem;
        font-size: 1.1rem;
        font-weight: bold;
        text-align: center;
      }
      .final-success {
        color: #155724;
        background-color: #d4edda;
        border: 2px solid #c3e6cb;
      }
      .final-error {
        color: #721c24;
        background-color: #f8d7da;
        border: 2px solid #f5c6cb;
      }
      .final-partial {
        color: #856404;
        background-color: #fff3cd;
        border: 2px solid #ffeeba;
      }
    </style>
    <script>
      // ── Utility: hex encode ArrayBuffer ──
      function bufToHex(buf) {
        return Array.from(new Uint8Array(buf))
          .map((b) => b.toString(16).padStart(2, "0"))
          .join("");
      }

      // ══════════════════════════════════════════════
      // HMAC primitives (native Web Crypto API)
      // ══════════════════════════════════════════════
      async function hmacSha512(key, message) {
        const enc = new TextEncoder();
        const cryptoKey = await crypto.subtle.importKey(
          "raw",
          enc.encode(key),
          { name: "HMAC", hash: "SHA-512" },
          false,
          ["sign"]
        );
        const sig = await crypto.subtle.sign(
          "HMAC",
          cryptoKey,
          enc.encode(message)
        );
        return bufToHex(sig);
      }

      async function hmacSha256(key, message) {
        const enc = new TextEncoder();
        const cryptoKey = await crypto.subtle.importKey(
          "raw",
          enc.encode(key),
          { name: "HMAC", hash: "SHA-256" },
          false,
          ["sign"]
        );
        const sig = await crypto.subtle.sign(
          "HMAC",
          cryptoKey,
          enc.encode(message)
        );
        return bufToHex(sig);
      }

      // ══════════════════════════════════════════════
      // Roll math
      // ══════════════════════════════════════════════
      const ROLL_CHARS = 15;

      // Returns the raw 60-bit BigInt extracted from HMAC-SHA512 (before any modulus).
      async function rollRaw(serverSeed, clientSeed, nonce) {
        const key = `${clientSeed}-${nonce}`;
        const hash = await hmacSha512(key, serverSeed);
        const subHash = hash.substring(0, ROLL_CHARS);
        return { raw: BigInt(`0x${subHash}`), fullHash: hash };
      }

      // sk_game tier roll: % 100000 + 1, range [1, 100000]
      async function calculateSkRoll(serverSeed, clientSeed, nonce) {
        const { raw } = await rollRaw(serverSeed, clientSeed, nonce);
        return Number(raw % 100000n) + 1;
      }

      // op_game card roll: % remainingLength, range [0, remainingLength)
      async function calculateOpRoll(
        serverSeed,
        clientSeed,
        nonce,
        remainingLength
      ) {
        const { raw } = await rollRaw(serverSeed, clientSeed, nonce);
        return Number(raw % BigInt(remainingLength));
      }

      // ══════════════════════════════════════════════
      // JSON shape detection
      // ══════════════════════════════════════════════
      function detectShape(data) {
        // sk_game audit bundle from GET /user/v1/server_seed/:id/audit_data
        if (
          data &&
          data.server_seed &&
          typeof data.server_seed === "object" &&
          Array.isArray(data.rolls)
        ) {
          return "sk_bundle";
        }
        const hasMerkle =
          data.merkle_index !== undefined &&
          (data.merkle_proof !== undefined || data.merkle_root !== undefined);
        const hasOpFields =
          hasMerkle ||
          data.pack_uuid !== undefined ||
          data.product_uuid !== undefined ||
          data.product_title !== undefined;
        if (hasOpFields) return "op";
        if (
          data.server_seed &&
          (data.client_seed || data.combined_client_seed) &&
          data.nonce !== undefined
        )
          return "sk";
        return "unknown";
      }

      // ══════════════════════════════════════════════
      // Helpers
      // ══════════════════════════════════════════════
      const checkRequiredProps = (obj, props) => {
        for (const prop of props) {
          if (!obj.hasOwnProperty(prop) || obj[prop] === "") {
            return false;
          }
        }
        return true;
      };

      // ══════════════════════════════════════════════
      // sk_game single roll verification
      // ══════════════════════════════════════════════
      const checkSkRoll = async (data) => {
        let html = "";

        if (data.server_seed[0] === "*" || data.secret_salt[0] === "*") {
          return '<p class="warning">Server Seed seems to be not yet revealed.<br> It is impossible to verify roll right now.</p>';
        }

        const clientSeed = data.combined_client_seed || data.client_seed;
        const calculated = await calculateSkRoll(
          data.server_seed,
          clientSeed,
          parseInt(data.nonce)
        );

        const expected = parseInt(
          data.roll ?? data.original_roll ?? data.calculated_roll
        );

        const hasExpected = !isNaN(expected);
        const isRollMatch = hasExpected && calculated === expected;

        let overallSuccess = true;
        let stepNum = 1;

        // Step 1: HMAC Roll Verification
        let rollTopHtml = `${stepNum}. HMAC Roll Verification (sk_game):<br>
          Scheme: <b>sk_game (% 100000 + 1)</b><br>
          Calculated Roll: <b>${calculated}</b>`;
        if (hasExpected) {
          rollTopHtml += `<br>Original Roll: <b>${expected}</b>`;
        }
        html += `<p class='info-top'>${rollTopHtml}</p>`;
        if (hasExpected) {
          if (isRollMatch) {
            html += `<p class='success-bottom'>✓ HMAC roll matches original_roll.</p>`;
          } else {
            html += `<p class='error-bottom'>✗ HMAC roll does NOT match original_roll.</p>`;
            overallSuccess = false;
          }
        } else {
          html += `<p class='warning-bottom'>⚠ No original_roll provided — showing calculated result only.</p>`;
          overallSuccess = false;
        }
        stepNum++;

        // Step 2: Tier bucket check (if odds_ranges provided)
        if (hasExpected && data.odds_ranges && Array.isArray(data.odds_ranges)) {
          const bucketed = data.odds_ranges.find(
            (r) =>
              Number(expected) >= Number(r.range_min) &&
              Number(expected) <= Number(r.range_max)
          );
          html += `<p class='info-top'>${stepNum}. Tier Bucket:<br>Roll: <b>${expected}</b></p>`;
          if (bucketed) {
            html += `<p class='success-bottom'>✓ Roll ${expected} falls in tier: <b>${bucketed.rarity_title}</b> (${bucketed.range_min}–${bucketed.range_max})</p>`;
          } else {
            html += `<p class='error-bottom'>✗ Roll ${expected} does not fall in any tier bucket.</p>`;
            overallSuccess = false;
          }
          stepNum++;
        }

        // Step N: Public Hash Verification
        const calculatedPublicHash = await hmacSha256(
          data.secret_salt,
          data.server_seed
        );
        const hashMatch = data.public_hash === calculatedPublicHash;
        if (!hashMatch) overallSuccess = false;

        html += `<p class='info-top'>${stepNum}. Public Hash Verification (HMAC-SHA256):<br>
          Public Hash: <b class='wrap-text' style='display:inline-block;max-width:100%;'>${data.public_hash}</b><br>
          Calculated Hash: <b class='wrap-text' style='display:inline-block;max-width:100%;'>${calculatedPublicHash}</b></p>`;
        html += hashMatch
          ? `<p class='success-bottom'>✓ Public Hash matches! Server seed is valid.</p>`
          : `<p class='error-bottom'>✗ Public Hash mismatch.</p>`;
        stepNum++;



        // Final result banner
        if (overallSuccess && hasExpected) {
          html += `<div class='final-result final-success'>✓ FINAL VERIFICATION: SUCCESS<br>All checks passed!</div>`;
        } else if (!hasExpected) {
          html += `<div class='final-result final-partial'>⚠ VERIFICATION: PARTIAL<br>No original roll to compare.</div>`;
        } else {
          html += `<div class='final-result final-error'>✗ FINAL VERIFICATION: FAILED<br>Some checks did not pass. See details above.</div>`;
        }

        return html;
      };

      // ══════════════════════════════════════════════
      // sk_bundle verification (audit data with server_seed object + rolls[])
      // ══════════════════════════════════════════════
      const checkSkBundle = async (data) => {
        let html = "";
        let allPassed = true;
        const seed = data.server_seed;
        const isRevealed =
          !!seed.is_revealed && seed.server_seed && seed.secret_salt;

        // Step 1: Seed Commitment
        if (isRevealed) {
          const hash = await hmacSha256(seed.secret_salt, seed.server_seed);
          const match = hash === seed.public_hash;
          if (!match) allPassed = false;
          html += `<p class='info-top'>1. Seed Commitment (HMAC-SHA256):<br>
            Public Hash: <b class='wrap-text' style='display:inline-block;max-width:100%;'>${seed.public_hash}</b><br>
            Calculated Hash: <b class='wrap-text' style='display:inline-block;max-width:100%;'>${hash}</b></p>`;
          html += match
            ? `<p class='success-bottom'>✓ Seed commitment is VALID! Revealed seed matches the published hash.</p>`
            : `<p class='error-bottom'>✗ Seed commitment FAILED! Revealed seed does NOT match the published hash.</p>`;
        } else {
          html += `<p class='info-top'>1. Seed Commitment:</p>`;
          html += `<p class='warning-bottom'>⚠ Seed is not yet revealed; commitment check requires reveal.</p>`;
        }

        // Per-roll loop
        let okCount = 0;
        let failCount = 0;
        let rows = "";
        for (const roll of data.rolls) {
          if (!isRevealed) {
            rows += `<tr><td>${roll.nonce}</td><td>${roll.roll ?? "-"}</td><td><span class="dim">(seed hidden)</span></td><td>${roll.result_game_item?.title || "-"}</td></tr>`;
            continue;
          }
          const cs = roll.client_seed;
          const calc = await calculateSkRoll(seed.server_seed, cs, roll.nonce);
          const rollOk = calc === Number(roll.roll);
          // Tier bucket check
          const bucketed = (roll.odds_ranges || []).find(
            (r) =>
              Number(roll.roll) >= Number(r.range_min) &&
              Number(roll.roll) <= Number(r.range_max)
          );
          if (rollOk && bucketed) okCount++;
          else {
            failCount++;
            allPassed = false;
          }
          rows += `<tr>
            <td>${roll.nonce}</td>
            <td>${roll.roll ?? "-"}</td>
            <td>${rollOk ? '<span class="check">&#10003;</span>' : '<span class="cross">&#10007;</span>'}</td>
            <td>${bucketed?.rarity_title || '<span class="cross">no tier</span>'}: ${roll.result_game_item?.title || "-"}</td>
          </tr>`;
        }

        html += `<p class='info-top'>2. Per-roll Verification (${data.rolls.length} rolls, ${okCount} ok, ${failCount} failed):</p>`;
        html += `<div style='background-color:#e2e3e5;padding:0.5rem;border-radius:0 0 0.25rem 0.25rem;'>`;
        html +=
          `<table style="width:100%;font-size:12px;margin-top:6px;border-collapse:collapse">` +
          `<thead><tr style="border-bottom:1px solid #999"><th align="left">Nonce</th><th align="left">Roll</th><th align="left">Roll OK</th><th align="left">Tier &amp; Card</th></tr></thead>` +
          `<tbody>${rows}</tbody></table>`;
        html += `</div>`;

        // Final result banner
        html += allPassed
          ? `<div class='final-result final-success'>✓ FINAL VERIFICATION: SUCCESS<br>All checks passed!</div>`
          : `<div class='final-result final-error'>✗ FINAL VERIFICATION: FAILED<br>Some checks did not pass. See details above.</div>`;

        return html;
      };

      // ══════════════════════════════════════════════
      // Main verification entry point
      // ══════════════════════════════════════════════
      const verifyRoll = async (rollData) => {
        try {
          const data = JSON.parse(rollData);
          const shape = detectShape(data);

          if (shape === "sk_bundle") {
            return await checkSkBundle(data);
          }

          if (shape === "sk") {
            // sk_game single roll
            const req = ["server_seed", "secret_salt", "public_hash", "nonce"];
            if (typeof data !== "object" || !checkRequiredProps(data, req)) {
              return '<p class="error">Your input is invalid.<br> Try copy JSON string from the site and paste here.</p>';
            }
            return await checkSkRoll(data);
          }

          if (shape === "op") {
            return '<p class="warning">This looks like an op_game proof. Please use the <b>op-merkle-validator</b> or the combined <b>index.html</b> verifier for op_game data.</p>';
          }

          return '<p class="error">Could not detect a sk_game or op_game proof shape in this JSON.<br>Try copy JSON string from the site and paste here.</p>';
        } catch (_error) {
          return "<p class='error'>Invalid JSON format. Please check your input.</p>";
        }
      };
    </script>
  </head>
  <body>
    <div class="container">
      <div id="output"></div>
      <h1>Enter Your Roll Data:</h1>
      <textarea id="input" placeholder="Paste JSON here..."></textarea>
      <button onclick="verifyInput()">Check!</button>
    </div>
    <script>
      async function verifyInput() {
        const input = document.getElementById("input").value;
        const result = await verifyRoll(input);
        document.getElementById("output").innerHTML = result;
      }
    </script>
  </body>
</html>
